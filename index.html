<!DOCTYPE html><html lang="id"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  <title>Test Notifikasi</title>  <style>    body {      display: flex;      height: 100vh;      justify-content: center;      align-items: center;      background: #1e1e2f;      color: white;      font-family: Arial, sans-serif;    }    button {      padding: 15px 30px;      font-size: 18px;      border-radius: 8px;      background: #4CAF50;      border: none;      cursor: pointer;    }    button:hover {      background: #45a049;    }  </style></head><body>  <button onclick="kirimNotifikasi()">Test Notifikasi</button>  <script>    if ('serviceWorker' in navigator) {      navigator.serviceWorker.register('sw.js').then(reg => {        console.log('Service Worker registered');      });    }    function kirimNotifikasi() {      if (!("Notification" in window)) {        alert("Notifikasi tidak didukung di browser ini");        return;      }      Notification.requestPermission().then(permission => {        if (permission === "granted") {          navigator.serviceWorker.ready.then(reg => {            reg.showNotification("Tes Notifikasi", {              body: "Ini adalah notifikasi dari service worker!",              icon: "https://via.placeholder.com/100"            });          });        } else {          alert("Izin notifikasi ditolak");        }      });    }  </script></body></html>
